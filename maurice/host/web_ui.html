<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maurice</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  color-scheme: dark;
  --bg: #141210;
  --panel: #1a1714;
  --panel-2: #211d19;
  --line: #2a2520;
  --soft: #8f8276;
  --text: #ddd8d0;
  --bright: #f0ebe3;
  --accent: #d97706;
  --accent-2: #92400e;
  --user: #7c2d12;
}
body {
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
#header {
  min-height: 52px;
  padding: 9px 18px;
  border-bottom: 1px solid #211e1a;
  display: flex;
  align-items: center;
  gap: 12px;
}
#logo { image-rendering: pixelated; display: block; flex-shrink: 0; }
#status {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #3a3530;
  transition: background .3s, box-shadow .3s;
}
#status.on { background: var(--accent); box-shadow: 0 0 5px #d9770666; }
#status.busy { animation: pulse 1s ease-in-out infinite; }
#agent {
  margin-left: auto;
  min-width: 130px;
  max-width: 220px;
  background: var(--panel);
  border: 1px solid #2e2a24;
  color: var(--soft);
  padding: 6px 26px 6px 9px;
  border-radius: 6px;
  font-size: 12px;
  outline: none;
}
#layout { min-height: 0; flex: 1; display: flex; }
#main {
  min-width: 0;
  min-height: 0;
  flex: 1;
  display: flex;
  flex-direction: column;
}
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg {
  max-width: min(78%, 880px);
  padding: 10px 14px;
  border-radius: 12px;
  line-height: 1.55;
  font-size: 14px;
  word-break: break-word;
}
.user {
  align-self: flex-end;
  background: var(--user);
  border-radius: 12px 12px 2px 12px;
  color: #fde8d8;
  white-space: pre-wrap;
}
.assistant {
  align-self: flex-start;
  background: var(--panel);
  border: 1px solid #272320;
  border-radius: 12px 12px 12px 2px;
}
.notice {
  align-self: center;
  max-width: 720px;
  color: #7f746a;
  border: 1px dashed #2b251f;
  background: transparent;
  font-size: 13px;
}
.assistant p { margin: 0 0 8px; }
.assistant p:last-child { margin: 0; }
.assistant h1, .assistant h2, .assistant h3 { margin: 10px 0 5px; color: var(--bright); font-weight: 650; }
.assistant h1 { font-size: 1.25em; }
.assistant h2 { font-size: 1.13em; }
.assistant h3 { font-size: 1.03em; }
.assistant ul, .assistant ol { padding-left: 21px; margin: 5px 0 9px; }
.assistant li { margin: 2px 0; }
.assistant code {
  background: #201d18;
  padding: 1px 5px;
  border-radius: 3px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 13px;
  color: #f59e0b;
}
.assistant pre {
  background: #161310;
  border: 1px solid #2a2520;
  padding: 10px 12px;
  border-radius: 7px;
  overflow-x: auto;
  margin: 7px 0;
}
.assistant pre code { background: none; padding: 0; color: #ddd8d0; }
.assistant a { color: #f59e0b; text-decoration: none; }
.assistant a:hover { text-decoration: underline; }
.assistant strong { color: var(--bright); }
.assistant blockquote { border-left: 3px solid #78350f; padding-left: 12px; color: #a0968c; margin: 7px 0; }
.thinking {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 14px 16px !important;
}
.thinking span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent-2);
  animation: bounce 1.2s infinite;
  opacity: .75;
}
.thinking span:nth-child(2) { animation-delay: .2s; }
.thinking span:nth-child(3) { animation-delay: .4s; }
#bar {
  padding: 14px 16px;
  border-top: 1px solid #1e1b17;
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
#input-wrap {
  flex: 1;
  position: relative;
  min-width: 0;
}
#input {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 11px 14px;
  border-radius: 10px;
  font-size: 14px;
  resize: none;
  max-height: 170px;
  line-height: 1.5;
  outline: none;
  display: block;
}
#input:focus { border-color: var(--accent-2); }
#autocomplete {
  position: absolute;
  left: 0;
  right: 0;
  bottom: calc(100% + 8px);
  max-height: min(310px, 45dvh);
  overflow-y: auto;
  background: #181512;
  border: 1px solid #342b22;
  border-radius: 10px;
  box-shadow: 0 16px 38px #0009;
  padding: 6px;
  display: none;
  z-index: 20;
}
#autocomplete.open { display: block; }
.suggestion {
  width: 100%;
  border: 0;
  background: transparent;
  color: var(--text);
  text-align: left;
  padding: 8px 10px;
  border-radius: 7px;
  cursor: pointer;
  display: grid;
  grid-template-columns: max-content minmax(0, 1fr);
  gap: 12px;
  align-items: baseline;
  font-size: 13px;
}
.suggestion strong {
  color: #f59e0b;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 13px;
}
.suggestion span {
  color: #92877d;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.suggestion.active,
.suggestion:hover {
  background: #2b2119;
  color: var(--bright);
}
.suggestion.active span,
.suggestion:hover span { color: #c7bdb3; }
#send {
  background: var(--accent-2);
  color: #fde8d8;
  border: none;
  padding: 11px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
}
#send:hover { background: #7c3510; }
#send:disabled { opacity: .45; cursor: default; }
@keyframes bounce { 0%,80%,100% { transform: scale(.7); opacity:.3; } 40% { transform: scale(1); opacity:.95; } }
@keyframes pulse { 50% { box-shadow: 0 0 10px #d97706aa; } }
@media (max-width: 780px) {
  .msg { max-width: 92%; }
  #agent { max-width: 150px; }
  .suggestion { grid-template-columns: 1fr; gap: 2px; }
  .suggestion span { white-space: normal; }
}
</style>
</head>
<body>
<div id="header">
  <canvas id="logo" width="76" height="10" title="MAURICE"></canvas>
  <div id="status"></div>
  <select id="agent" title="Agent"></select>
</div>
<div id="layout">
  <main id="main">
    <div id="messages"></div>
    <div id="bar">
      <div id="input-wrap">
        <div id="autocomplete" role="listbox" aria-label="Commandes"></div>
        <textarea id="input" rows="1" placeholder="Message…" autocomplete="off"></textarea>
      </div>
      <button id="send">Envoyer</button>
    </div>
  </main>
</div>
<script>
(function drawLogo() {
  const letters = {
    M: ["1001","1111","1111","1001","1001"],
    A: ["0110","1001","1111","1001","1001"],
    U: ["1001","1001","1001","1001","0110"],
    R: ["1110","1001","1110","1010","1001"],
    I: ["111","010","010","010","111"],
    C: ["0111","1000","1000","1000","0111"],
    E: ["1111","1000","1110","1000","1111"],
  };
  const word = "MAURICE";
  const c = document.getElementById("logo");
  const ctx = c.getContext("2d");
  const scale = 2;
  let xOffset = 0;
  ctx.fillStyle = "#d97706";
  for (const ch of word) {
    const rows = letters[ch];
    for (let y = 0; y < rows.length; y++) {
      for (let x = 0; x < rows[y].length; x++) {
        if (rows[y][x] === "1") ctx.fillRect(xOffset + x * scale, y * scale, scale, scale);
      }
    }
    xOffset += rows[0].length * scale + scale;
  }
})();

const $ = id => document.getElementById(id);
const statusDot = $("status");
const messages = $("messages");
const input = $("input");
const sendBtn = $("send");
const agentSelect = $("agent");
const autocomplete = $("autocomplete");
const AGENT_KEY = "maurice_web_agent_id";
const SESSION_PREFIX = "maurice_web_session:";
let activeAgent = localStorage.getItem(AGENT_KEY) || "main";
let sessionId = sessionFor(activeAgent);
let busy = false;
let thinking = null;
let commandChoices = [];
let suggestionIndex = 0;
let lastCommandQuery = "";

function esc(value) {
  return String(value ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderMd(raw) {
  const saved = [];
  const save = html => { saved.push(html); return "\x00" + (saved.length - 1) + "\x00"; };
  let s = String(raw ?? "").replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    save("<pre><code>" + esc(code) + "</code></pre>")
  );
  s = s.replace(/`([^`\n]+)`/g, (_, code) => save("<code>" + esc(code) + "</code>"));
  s = esc(s);
  s = s.replace(/^&gt; (.+)$/gm, "<blockquote>$1</blockquote>");
  s = s.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  s = s.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  s = s.replace(/^# (.+)$/gm, "<h1>$1</h1>");
  s = s.replace(/\*\*(.+?)\*\*/gs, "<strong>$1</strong>");
  s = s.replace(/\*(.+?)\*/gs, "<em>$1</em>");
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/^[-*+] (.+)$/gm, "<li>$1</li>");
  s = s.replace(/^\d+\. (.+)$/gm, "<li>$1</li>");
  s = s.replace(/((?:<li>[^\n]*\n?)+)/g, "<ul>$1</ul>");
  s = s.split(/\n{2,}/).map(part => {
    const p = part.trim();
    if (!p) return "";
    if (/^<(h[1-6]|ul|pre|blockquote)/.test(p)) return p;
    if (p.includes("\x00")) return p;
    return "<p>" + p.replace(/\n/g, "<br>") + "</p>";
  }).filter(Boolean).join("\n");
  return s.replace(/\x00(\d+)\x00/g, (_, index) => saved[Number(index)]) || "";
}

function sessionFor(agentId) {
  const key = SESSION_PREFIX + agentId;
  const existing = localStorage.getItem(key);
  if (existing) return existing;
  const created = `web:${agentId}:${Date.now()}`;
  localStorage.setItem(key, created);
  return created;
}

function setOnline(on) {
  statusDot.classList.toggle("on", on);
}

function setBusy(on) {
  busy = on;
  sendBtn.disabled = on;
  statusDot.classList.toggle("busy", on);
}

function mkMsg(cls) {
  const el = document.createElement("div");
  el.className = "msg " + cls;
  return el;
}

function addNotice(text) {
  const el = mkMsg("notice");
  el.textContent = text;
  messages.appendChild(el);
  scrollBottom();
}

function addUser(text) {
  const el = mkMsg("user");
  el.textContent = text;
  messages.appendChild(el);
  scrollBottom();
}

function addAssistant(text) {
  const el = mkMsg("assistant");
  el.innerHTML = renderMd(text);
  messages.appendChild(el);
  scrollBottom();
}

function showThinking() {
  thinking = mkMsg("assistant thinking");
  thinking.innerHTML = "<span></span><span></span><span></span>";
  messages.appendChild(thinking);
  scrollBottom();
}

function hideThinking() {
  if (thinking) thinking.remove();
  thinking = null;
}

function scrollBottom() {
  messages.scrollTop = messages.scrollHeight;
}

async function loadAgents() {
  try {
    const res = await fetch("/api/agents");
    const data = await res.json();
    const agents = Array.isArray(data.agents) && data.agents.length ? data.agents : [{id: "main"}];
    agentSelect.innerHTML = "";
    for (const agent of agents) {
      const opt = document.createElement("option");
      opt.value = agent.id;
      opt.textContent = agent.id;
      if (agent.model) opt.title = `${agent.provider || ""}:${agent.model}`;
      agentSelect.appendChild(opt);
    }
    if (!agents.some(agent => agent.id === activeAgent)) activeAgent = agents[0].id;
    agentSelect.value = activeAgent;
    localStorage.setItem(AGENT_KEY, activeAgent);
    setOnline(true);
  } catch (error) {
    console.error(error);
    agentSelect.innerHTML = '<option value="main">main</option>';
    activeAgent = "main";
  }
}

async function loadHistory() {
  const wasNearBottom = messages.scrollTop + messages.clientHeight >= messages.scrollHeight - 24;
  try {
    const url = `/api/session?agent_id=${encodeURIComponent(activeAgent)}&session_id=${encodeURIComponent(sessionId)}`;
    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();
    messages.innerHTML = "";
    for (const msg of data.messages || []) {
      if (msg.role === "user") addUser(msg.content || "");
      else if (msg.role === "assistant") addAssistant(msg.content || "");
      else if (msg.content) addNotice(msg.content);
    }
    if (wasNearBottom) scrollBottom();
  } catch (error) {
    console.error(error);
  }
}

async function refreshCommands() {
  const response = await sendMessage("/help", {silent: true});
  if (!response) return;
  const lines = response.split("\n").filter(line => line.startsWith("/"));
  commandChoices = [];
  for (const line of lines) {
    const [name, ...rest] = line.split(" - ");
    const commandName = name.trim();
    const description = rest.join(" - ").trim();
    commandChoices.push({name: commandName, description});
  }
  updateAutocomplete();
}

async function sendMessage(text, options = {}) {
  if (!text || busy) return "";
  if (!options.silent) {
    addUser(text);
    input.value = "";
    input.style.height = "";
    showThinking();
  }
  setBusy(true);
  try {
    const res = await fetch("/api/message", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        message: text,
        agent_id: activeAgent,
        session_id: sessionId,
        peer_id: sessionId,
        persist: !options.silent,
      }),
    });
    const payload = await res.json();
    if (!payload.ok) throw new Error(payload.error || "Erreur gateway");
    const answer = payload.result?.outbound?.text || "";
    if (!options.silent) addAssistant(answer);
    return answer;
  } catch (error) {
    if (!options.silent) addAssistant("Erreur : " + (error instanceof Error ? error.message : String(error)));
    return "";
  } finally {
    hideThinking();
    setBusy(false);
  }
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  closeAutocomplete();
  await sendMessage(text);
}

async function newSession() {
  const previous = sessionId;
  sessionId = `web:${activeAgent}:${Date.now()}`;
  localStorage.setItem(SESSION_PREFIX + activeAgent, sessionId);
  messages.innerHTML = "";
  addNotice("Nouvelle session demarree.");
  if (previous) {
    try {
      await fetch(`/api/session?agent_id=${encodeURIComponent(activeAgent)}&session_id=${encodeURIComponent(previous)}`, {method: "DELETE"});
    } catch (error) {
      console.error(error);
    }
  }
}

agentSelect.onchange = async () => {
  if (busy) {
    agentSelect.value = activeAgent;
    return;
  }
  activeAgent = agentSelect.value || "main";
  localStorage.setItem(AGENT_KEY, activeAgent);
  sessionId = sessionFor(activeAgent);
  messages.innerHTML = "";
  await loadHistory();
  await refreshCommands();
};

sendBtn.onclick = () => { void send(); };
input.addEventListener("keydown", event => {
  if (autocomplete.classList.contains("open")) {
    if (event.key === "ArrowDown") {
      event.preventDefault();
      moveSuggestion(1);
      return;
    }
    if (event.key === "ArrowUp") {
      event.preventDefault();
      moveSuggestion(-1);
      return;
    }
    if (event.key === "Tab" || event.key === "Enter") {
      event.preventDefault();
      applySuggestion();
      return;
    }
    if (event.key === "Escape") {
      event.preventDefault();
      closeAutocomplete();
      return;
    }
  }
  if (event.key === "Enter" && !event.shiftKey) {
    event.preventDefault();
    void send();
  }
});
input.addEventListener("input", () => {
  input.style.height = "";
  input.style.height = input.scrollHeight + "px";
  updateAutocomplete();
});
input.addEventListener("focus", updateAutocomplete);
document.addEventListener("click", event => {
  if (!autocomplete.contains(event.target) && event.target !== input) closeAutocomplete();
});

function updateAutocomplete() {
  const value = input.value;
  const query = commandQuery(value);
  if (query === null || !commandChoices.length || busy) {
    closeAutocomplete();
    return;
  }
  const normalized = query.toLowerCase();
  if (query !== lastCommandQuery) {
    suggestionIndex = 0;
    lastCommandQuery = query;
  }
  const matches = commandChoices
    .filter(command => command.name.toLowerCase().startsWith(normalized));
  if (!matches.length) {
    closeAutocomplete();
    return;
  }
  suggestionIndex = Math.min(suggestionIndex, matches.length - 1);
  autocomplete.innerHTML = "";
  for (const [index, command] of matches.entries()) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "suggestion" + (index === suggestionIndex ? " active" : "");
    btn.setAttribute("role", "option");
    btn.innerHTML = `<strong>${esc(command.name)}</strong><span>${esc(command.description)}</span>`;
    btn.onmouseenter = () => {
      suggestionIndex = index;
      renderSuggestionSelection();
    };
    btn.onclick = () => applySuggestion(command.name);
    autocomplete.appendChild(btn);
  }
  autocomplete.classList.add("open");
}

function commandQuery(value) {
  const text = value.trimStart();
  if (!text.startsWith("/")) return null;
  if (/\s/.test(text)) return null;
  return text;
}

function moveSuggestion(delta) {
  const items = autocomplete.querySelectorAll(".suggestion");
  if (!items.length) return;
  suggestionIndex = (suggestionIndex + delta + items.length) % items.length;
  renderSuggestionSelection();
}

function renderSuggestionSelection() {
  const items = autocomplete.querySelectorAll(".suggestion");
  items.forEach((item, index) => item.classList.toggle("active", index === suggestionIndex));
  items[suggestionIndex]?.scrollIntoView({block: "nearest"});
}

function applySuggestion(value) {
  const selected = value || autocomplete.querySelectorAll(".suggestion")[suggestionIndex]?.querySelector("strong")?.textContent;
  if (!selected) return;
  input.value = selected;
  input.style.height = "";
  input.style.height = input.scrollHeight + "px";
  closeAutocomplete();
  input.focus();
}

function closeAutocomplete() {
  autocomplete.classList.remove("open");
  autocomplete.innerHTML = "";
  suggestionIndex = 0;
  lastCommandQuery = "";
}

(async function init() {
  await loadAgents();
  sessionId = sessionFor(activeAgent);
  await loadHistory();
  await refreshCommands();
  window.setInterval(() => {
    if (!busy && document.visibilityState === "visible") void loadHistory();
  }, 5000);
})();
</script>
</body>
</html>
