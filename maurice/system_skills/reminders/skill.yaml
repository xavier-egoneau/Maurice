name: reminders
version: 0.1.0
origin: system
mutable: false
required: false
description: Create, list, cancel, and fire local reminders through the generic scheduler.
config_namespace: skills.reminders
requires:
  binaries: []
  credentials: []
dependencies:
  skills: []
  optional_skills: []
permissions:
  - class: fs.write
    scope:
      paths:
        - "$agent_workspace/reminders/**"
tools:
  - name: reminders.create
    description: Create a scheduled reminder. Prefer trigger_type/trigger_value for natural reminders; keep run_at for exact ISO datetimes.
    input_schema:
      type: object
      properties:
        text:
          type: string
        run_at:
          type: string
          description: Exact ISO datetime, used only when trigger_type/trigger_value are not provided.
        trigger_type:
          type: string
          enum: ["at", "every"]
          description: "'at' for one-shot reminders, 'every' for recurring interval reminders."
        trigger_value:
          type: string
          description: "'20m', '2h', '1d', '08:00', '1h08', or an ISO datetime for at; '20m', '2h', '1d' for every."
        interval_seconds:
          type: integer
          description: Optional repeat interval in seconds after the first run_at. Omit for one-shot reminders; 0 is treated as omitted.
      required: ["text"]
    permission_class: fs.write
    permission_scope:
      paths:
        - "$agent_workspace/reminders/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.reminders.tools.create
  - name: reminders.list
    description: List reminders.
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []
    permission_class: fs.read
    permission_scope:
      paths:
        - "$agent_workspace/reminders/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.reminders.tools.list_reminders
  - name: reminders.cancel
    description: Cancel a scheduled reminder.
    input_schema:
      type: object
      properties:
        reminder_id:
          type: string
      required: ["reminder_id"]
    permission_class: fs.write
    permission_scope:
      paths:
        - "$agent_workspace/reminders/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.reminders.tools.cancel
backend: null
storage:
  engine: json
  path: "$agent_workspace/reminders/reminders.json"
  schema_version: 1
  migrations: []
dreams:
  attachment: dreams.md
events:
  state_publisher: null
tools_module: maurice.system_skills.reminders.tools
