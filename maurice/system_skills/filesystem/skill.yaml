name: filesystem
version: 0.1.0
origin: system
mutable: false
required: false
description: Scoped filesystem access through Maurice permissions.
config_namespace: skills.filesystem
requires:
  binaries: []
  credentials: []
dependencies:
  skills: []
  optional_skills: []
permissions:
  - class: fs.read
    scope:
      paths:
        - "$workspace/**"
      exclude:
        - "$workspace/secrets/**"
  - class: fs.write
    scope:
      paths:
        - "$workspace/**"
      exclude:
        - "$workspace/secrets/**"
tools:
  - name: filesystem.list
    description: List entries inside an allowed directory.
    input_schema:
      type: object
      properties:
        path:
          type: string
      required: ["path"]
    permission_class: fs.read
    permission_scope:
      paths:
        - "$workspace/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.filesystem.tools.list_entries
  - name: filesystem.read
    description: Read a text file inside an allowed scope.
    input_schema:
      type: object
      properties:
        path:
          type: string
      required: ["path"]
    permission_class: fs.read
    permission_scope:
      paths:
        - "$workspace/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.filesystem.tools.read_text
  - name: filesystem.write
    description: Write a text file inside an allowed scope.
    input_schema:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required: ["path", "content"]
    permission_class: fs.write
    permission_scope:
      paths:
        - "$workspace/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.filesystem.tools.write_text
  - name: filesystem.mkdir
    description: Create a directory inside an allowed scope.
    input_schema:
      type: object
      properties:
        path:
          type: string
      required: ["path"]
    permission_class: fs.write
    permission_scope:
      paths:
        - "$workspace/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.filesystem.tools.make_directory
backend: null
storage: null
dreams:
  attachment: dreams.md
events:
  state_publisher: null
