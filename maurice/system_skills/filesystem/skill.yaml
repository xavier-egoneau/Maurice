name: filesystem
version: 0.1.0
origin: system
mutable: false
required: false
description: Scoped filesystem access. Relative user file names resolve under the active project or agent content by default.
config_namespace: skills.filesystem
requires:
  binaries: []
  credentials: []
dependencies:
  skills: []
  optional_skills: []
permissions:
  - class: fs.read
    scope:
      paths:
        - "$workspace/**"
        - "$project/**"
      exclude:
        - "$workspace/secrets/**"
        - "$project/secrets/**"
  - class: fs.write
    scope:
      paths:
        - "$workspace/**"
        - "$project/**"
      exclude:
        - "$workspace/secrets/**"
        - "$project/secrets/**"
tools:
  - name: filesystem.list
    description: List entries inside an allowed directory. Relative user folders default to the active project or agent content.
    input_schema:
      type: object
      properties:
        path:
          type: string
      required: ["path"]
    permission_class: fs.read
    permission_scope:
      paths:
        - "$workspace/**"
        - "$project/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.filesystem.tools.list_entries
  - name: filesystem.read
    description: Read a text file inside an allowed scope. Relative user files default to the active project or agent content.
    input_schema:
      type: object
      properties:
        path:
          type: string
      required: ["path"]
    permission_class: fs.read
    permission_scope:
      paths:
        - "$workspace/**"
        - "$project/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.filesystem.tools.read_text
  - name: filesystem.write
    description: Write a text file inside an allowed scope. Relative user files default to the active project or agent content.
    input_schema:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required: ["path", "content"]
    permission_class: fs.write
    permission_scope:
      paths:
        - "$workspace/**"
        - "$project/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.filesystem.tools.write_text
  - name: filesystem.mkdir
    description: Create a directory inside an allowed scope. Relative user folders default to the active project or agent content.
    input_schema:
      type: object
      properties:
        path:
          type: string
      required: ["path"]
    permission_class: fs.write
    permission_scope:
      paths:
        - "$workspace/**"
        - "$project/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.filesystem.tools.make_directory
  - name: filesystem.move
    description: Move or rename a file or directory inside an allowed scope. Use this when the user asks to move, rename, or put a folder back in the right place.
    input_schema:
      type: object
      properties:
        source_path:
          type: string
        target_path:
          type: string
        overwrite:
          type: boolean
      required: ["source_path", "target_path"]
    permission_class: fs.write
    permission_scope:
      paths:
        - "$workspace/**"
        - "$project/**"
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.filesystem.tools.move_path
backend: null
storage: null
dreams:
  attachment: dreams.md
events:
  state_publisher: null
tools_module: maurice.system_skills.filesystem.tools
