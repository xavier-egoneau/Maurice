name: self_update
version: 0.1.0
origin: system
mutable: false
required: false
description: Runtime self-update proposal generation.
config_namespace: skills.self_update
requires:
  binaries: []
  credentials: []
dependencies:
  skills: []
  optional_skills: []
permissions:
  - class: fs.write
    scope:
      paths:
        - $workspace/reports/bugs/**
  - class: runtime.write
    scope:
      targets:
        - kernel
        - host
        - system_skill:*
        - packaged_defaults
        - installer
      mode: proposal_only
tools:
  - name: self_update.propose
    description: Create a runtime update proposal under the workspace.
    input_schema:
      type: object
      properties:
        target_type:
          type: string
        target_name:
          type: string
        runtime_path:
          type: string
        summary:
          type: string
        patch:
          type: string
        risk:
          type: string
        test_plan:
          type: string
        requires_restart:
          type: boolean
        created_by_agent:
          type: string
        mode:
          type: string
        target:
          type: string
      required: ["target_type", "target_name", "runtime_path", "summary", "patch", "risk", "test_plan"]
    permission_class: runtime.write
    permission_scope:
      targets:
        - kernel
        - host
        - system_skill:*
        - packaged_defaults
        - installer
      mode: proposal_only
    trust:
      input: local_mutable
      output: skill_generated
    executor: maurice.system_skills.self_update.tools.propose
  - name: self_update.report_bug
    description: Record a Maurice runtime or skill bug under the workspace without proposing a patch.
    input_schema:
      type: object
      properties:
        target_type:
          type: string
        target_name:
          type: string
        title:
          type: string
        summary:
          type: string
        observed:
          type: string
        expected:
          type: string
        severity:
          type: string
        reproduction:
          type: string
        workaround:
          type: string
        evidence:
          type: array
          items:
            type: string
        created_by_agent:
          type: string
      required: ["target_type", "title", "summary", "observed", "expected", "severity"]
    permission_class: fs.write
    permission_scope:
      paths:
        - $workspace/reports/bugs/**
    trust:
      input: local_mutable
      output: skill_generated
    executor: maurice.system_skills.self_update.tools.report_bug
commands:
  - name: /auto_update_list
    description: lister les propositions d'auto-update Maurice
    handler: maurice.system_skills.self_update.commands.auto_update_list
    renderer: markdown
  - name: /auto_update_apply
    description: appliquer une proposition d'auto-update apres confirmation explicite
    handler: maurice.system_skills.self_update.commands.auto_update_apply
    renderer: markdown
backend: null
storage: null
dreams:
  attachment: dreams.md
events:
  state_publisher: null
tools_module: maurice.system_skills.self_update.tools
