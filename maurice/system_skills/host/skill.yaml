name: host
version: 0.1.0
origin: system
mutable: false
required: false
description: Administer Maurice configuration and service state.
config_namespace: skills.host
requires:
  binaries: []
  credentials: []
dependencies:
  skills: []
  optional_skills: []
permissions:
  - class: host.control
    scope:
      actions:
        - diagnostics.run
        - service.status
        - logs.read
        - credentials.list
        - credentials.capture
        - agents.list
        - agents.create
        - agents.update
        - agents.delete
        - dev_workers.configure
        - telegram.configure
tools:
  - name: host.set_active_project
    description: >
      Set the active project for this session. The project must exist as a directory.
      Provide an absolute path or a project name from the known projects list.
      The change takes effect from the next message — confirm to the user after calling this.
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the project directory.
        name:
          type: string
          description: Project name as it appears in the known projects list.
      required: []
    permission_class: fs.write
    permission_scope:
      paths:
        - $agent_workspace/**
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.set_active_project
  - name: host.status
    description: Inspect local Maurice service status for the current workspace.
    input_schema:
      type: object
      properties: {}
      required: []
    permission_class: host.control
    permission_scope:
      actions:
        - service.status
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.status
  - name: host.doctor
    description: Run the same workspace/runtime diagnostic report as `maurice doctor`.
    input_schema:
      type: object
      properties: {}
      required: []
    permission_class: host.control
    permission_scope:
      actions:
        - diagnostics.run
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.doctor
  - name: host.logs
    description: Read recent Maurice event logs for an agent.
    input_schema:
      type: object
      properties:
        agent:
          type: string
        limit:
          type: integer
          minimum: 1
      required: []
    permission_class: host.control
    permission_scope:
      actions:
        - logs.read
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.logs
  - name: host.credentials
    description: List configured credential profiles without revealing secret values.
    input_schema:
      type: object
      properties: {}
      required: []
    permission_class: host.control
    permission_scope:
      actions:
        - credentials.list
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.credentials
  - name: host.request_secret
    description: Arm a one-message secure capture for a secret; the next channel message is stored as a credential and not sent to the model.
    input_schema:
      type: object
      properties:
        credential:
          type: string
        provider:
          type: string
          default: telegram_bot
        type:
          type: string
          enum: [api_key, token, url, password, opaque]
          default: token
        prompt:
          type: string
      required: [credential]
    permission_class: host.control
    permission_scope:
      actions:
        - credentials.capture
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.request_secret
  - name: host.agent_list
    description: List durable agents without revealing secrets.
    input_schema:
      type: object
      properties: {}
      required: []
    permission_class: host.control
    permission_scope:
      actions:
        - agents.list
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.agent_list
  - name: host.agent_create
    description: Create a durable agent from a reviewed structured proposal. Secret values must be captured separately through host.request_secret.
    input_schema:
      type: object
      properties:
        agent_id:
          type: string
        permission_profile:
          type: string
          enum: [safe, limited, power]
        skills:
          type: array
          items:
            type: string
        credentials:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        model_chain:
          type: array
          items:
            type: string
        make_default:
          type: boolean
          default: false
      required: [agent_id]
    permission_class: host.control
    permission_scope:
      actions:
        - agents.create
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.agent_create
  - name: host.agent_update
    description: Update a durable agent from a reviewed structured proposal. Secret values must be captured separately through host.request_secret.
    input_schema:
      type: object
      properties:
        agent_id:
          type: string
        permission_profile:
          type: string
          enum: [safe, limited, power]
        skills:
          type: array
          items:
            type: string
        credentials:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string
        model_chain:
          type: array
          items:
            type: string
        make_default:
          type: boolean
      required: [agent_id]
    permission_class: host.control
    permission_scope:
      actions:
        - agents.update
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.agent_update
  - name: host.agent_delete
    description: Delete a durable agent after explicit user approval. This removes the agent config and workspace.
    input_schema:
      type: object
      properties:
        agent_id:
          type: string
      required: [agent_id]
    permission_class: host.control
    permission_scope:
      actions:
        - agents.delete
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.agent_delete
  - name: host.dev_worker_model_update
    description: Configure the model chain used by dev workers for an agent. Empty model_chain means workers inherit the parent agent model chain.
    input_schema:
      type: object
      properties:
        agent_id:
          type: string
        model_chain:
          type: array
          items:
            type: string
      required: [agent_id]
    permission_class: host.control
    permission_scope:
      actions:
        - dev_workers.configure
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.dev_worker_model_update
  - name: host.telegram_bind
    description: Connect the configured Telegram bot to a durable agent. Secret values must be captured separately through host.request_secret if the bot token is missing.
    input_schema:
      type: object
      properties:
        agent_id:
          type: string
        credential:
          type: string
          default: telegram_bot
        allowed_users:
          type: array
          items:
            type: integer
        allowed_chats:
          type: array
          description: Chat ids autorises. Les ids utilisateurs fournis dans allowed_users sont automatiquement ajoutes comme chats prives.
          items:
            type: integer
      required: [agent_id]
    permission_class: host.control
    permission_scope:
      actions:
        - telegram.configure
    trust:
      input: local_mutable
      output: local_mutable
    executor: maurice.system_skills.host.tools.telegram_bind
commands:
  - name: /add_agent
    description: creer un nouvel agent
    renderer: markdown
    available_in: [global]
  - name: /edit_agent
    description: modifier un agent (`/edit_agent <agent>`)
    renderer: markdown
    available_in: [global]
backend: null
storage: null
dreams:
  attachment: dreams.md
events:
  state_publisher: null
tools_module: maurice.system_skills.host.tools
